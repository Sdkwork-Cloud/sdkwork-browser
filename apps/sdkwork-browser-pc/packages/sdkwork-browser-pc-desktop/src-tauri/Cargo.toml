[package]
name = "sdkwork-browser-pc-desktop"
version = "0.1.0"
description = "SDKWork Browser PC Tauri desktop host shell."
authors = ["SDKWork"]
license = "Apache-2.0"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
url = "2"
tauri = { version = "2", features = ["unstable"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
sdkwork-browser-tauri-host = { path = "../../../../../crates/sdkwork-browser-tauri-host" }
sdkwork-browser-platform-service = { path = "../../../../../crates/sdkwork-browser-platform-service" }

[lib]
name = "sdkwork_browser_pc_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "sdkwork-browser-pc-desktop"
path = "src/main.rs"
