"$schema" = "schemas/schema.json"

[[set]]
identifier = "browser-host-commands"
description = "SDKWork Browser platform host bridge commands invoked from the renderer."
permissions = [
  "allow-browser-host-status",
  "allow-browser-platform-snapshot",
  "allow-browser-start-engine",
  "allow-browser-load-url",
  "allow-browser-switch-engine",
  "allow-browser-cef-surface",
  "allow-browser-sync-live-html",
  "allow-browser-page-context",
  "allow-browser-agent-execute",
  "allow-browser-agent-chat",
  "allow-browser-agent-chat-stream",
  "allow-browser-mcp-list-tools",
  "allow-browser-mcp-invoke",
  "allow-browser-group-tabs",
  "allow-browser-set-active-tab",
  "allow-browser-content-mount",
  "allow-browser-content-navigate",
  "allow-browser-content-open",
  "allow-browser-content-hide",
  "allow-browser-content-capture",
  "allow-desktop-window-minimize",
  "allow-desktop-window-toggle-maximize",
  "allow-desktop-window-close",
  "allow-desktop-window-is-maximized",
]

[[permission]]
identifier = "allow-browser-host-status"
description = "Enables the host_status command."
commands.allow = ["host_status"]

